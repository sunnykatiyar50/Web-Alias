<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Import Web Aliases</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #313244;
      padding: 2.5rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }
    h2 {
      margin-top: 0;
      color: #f5e0dc;
    }
    p {
      color: #bac2de;
      margin-bottom: 2rem;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      background: #89b4fa;
      color: #11111b;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
      display: inline-block;
    }
    .btn:hover {
      background: #b4befe;
    }
    #status {
      margin-top: 1.5rem;
      color: #a6e3a1;
      font-weight: 500;
    }
    #error {
      margin-top: 1.5rem;
      color: #f38ba8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Import Web Aliases</h2>
    <p>Select your exported JSON file to import aliases.</p>
    <label for="file-import" class="btn">Choose File</label>
    <input type="file" id="file-import" accept=".json">
    <div id="status"></div>
    <div id="error"></div>
  </div>
  <script src="utils/storage.js"></script>
  <script src="import.js"></script>
</body>
</html>
