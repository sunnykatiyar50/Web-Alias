<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Web Alias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header__brand">
      <svg class="header__logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <h1 class="header__title">Web Alias</h1>
    </div>
    <div class="header__actions">
      <button id="btn-theme" class="icon-btn" title="Toggle theme">
        <svg class="icon-system" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Search & Add bar ─── -->
  <div class="toolbar">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" class="search-box__input" placeholder="Search aliases…" autocomplete="off">
    </div>
    <button id="btn-add" class="btn btn--primary" title="Add alias">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add</span>
    </button>
  </div>

  <!-- ─── Alias List ─── -->
  <div id="alias-list" class="alias-list">
    <!-- JS-rendered -->
  </div>

  <!-- ─── Empty state ─── -->
  <div id="empty-state" class="empty-state hidden">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <p>No aliases yet.</p>
    <p class="empty-state__hint">Click <strong>Add</strong> or type <kbd>z</kbd> + space in the address bar.</p>
  </div>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <button id="btn-import" class="footer__btn" title="Import aliases">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Import
    </button>
    <button id="btn-export" class="footer__btn" title="Export aliases">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Export
    </button>
    <span class="footer__spacer"></span>
    <span id="alias-count" class="footer__count">0 aliases</span>
  </footer>

  <!-- ─── Add/Edit Modal ─── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal__header">
        <h2 id="modal-title" class="modal__title">Add Alias</h2>
        <button id="btn-modal-close" class="icon-btn" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="alias-form" class="modal__form">
        <div class="form-group">
          <label for="field-name">Display Name</label>
          <input type="text" id="field-name" placeholder="GitHub" required>
        </div>
        <div class="form-group">
          <label for="field-alias">Alias</label>
          <input type="text" id="field-alias" placeholder="gh" required pattern="[a-zA-Z0-9\-_]+" title="Letters, numbers, hyphens, underscores only">
        </div>
        <div class="form-group">
          <label for="field-url">URL</label>
          <input type="url" id="field-url" placeholder="https://github.com" required>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn--ghost">Cancel</button>
          <button type="submit" id="btn-save" class="btn btn--primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Hidden file input for import removed, logic moved to import.html -->

  <script src="../utils/storage.js"></script>
  <script src="../utils/favicon.js"></script>
  <script src="../utils/theme.js"></script>
  <script src="popup.js"></script>
</body>
</html>
